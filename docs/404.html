<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>DinkMatch - Queueing (Open Play)</title>
  <script>
    // SPA fallback for GitHub Pages
    // Redirects any 404 path back to index.html as a hash route so the SPA can handle it
    var l = window.location;
    var path = l.pathname.slice(1); // remove leading /
    var newUrl = l.origin + '/#' + (path ? '/' + path : '') + l.search + l.hash;
    l.replace(newUrl);
  </script>
</head>
<body></body>
</html>
